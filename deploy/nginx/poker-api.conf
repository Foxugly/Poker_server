# Delegation Poker API — nginx reverse proxy to Daphne (ASGI, 127.0.0.1:8006).
# ⚠️ Fleet's ONLY WebSocket vhost: `location /ws/` upgrades to the ASGI server
# (README-handoff §4). TLS uses the shared wildcard lineage `foxugly.com` — never
# a per-subdomain certbot cert (§3.6).
#
# Installed to /etc/nginx/sites-available/poker-api.conf, symlinked into sites-enabled.

server {
    listen 80;
    server_name poker-api.foxugly.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name poker-api.foxugly.com;

    ssl_certificate     /etc/letsencrypt/live/foxugly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 8m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location /static/ {
        alias /var/www/django_websites/Poker_server/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/django_websites/Poker_server/media/;
        access_log off;
        expires 30d;
    }

    # --- WebSocket (Django Channels) — the fleet exception ---
    location /ws/ {
        proxy_pass http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    access_log /var/log/nginx/poker-access.log;
    error_log  /var/log/nginx/poker-error.log;
}
