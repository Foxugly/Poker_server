# Delegation Poker API — nginx reverse proxy to Daphne (ASGI, 127.0.0.1:8006).
# ⚠️ This is the fleet's ONLY WebSocket vhost: the `location /ws/` block upgrades
# the connection to the ASGI server (README-handoff §4). Certbot's 443 block +
# HTTP->HTTPS redirect are added on top (wildcard cert *.foxugly.com, §3.6).
#
# Installed to /etc/nginx/sites-available/poker-api.conf, symlinked into
# sites-enabled. TLS uses the shared wildcard lineage — never a per-subdomain cert.

server {
    listen 80;
    server_name poker-api.foxugly.com;

    client_max_body_size 8m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        image/svg+xml application/manifest+json;

    location /static/ {
        alias /var/www/django_websites/Poker_server/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/django_websites/Poker_server/media/;
        access_log off;
        expires 30d;
    }

    # --- WebSocket (Django Channels) — the fleet exception ---
    # Upgrade the HTTP/1.1 connection so the ASGI server sees a live WS. The long
    # read timeout keeps idle sockets open between votes (app-level ping every 20s).
    location /ws/ {
        proxy_pass http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    access_log /var/log/nginx/poker-access.log;
    error_log  /var/log/nginx/poker-error.log;
}
