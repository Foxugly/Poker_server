name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          STATE: TEST
          SECRET_KEY: test-secret-key
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write # mint the OIDC token to assume the deploy role
      contents: read

    steps:
      # OIDC -> SSM (no static SSH key). AWS-RunShellScript runs as root: it
      # installs every root-loaded artifact (units, nginx vhost, the env-fetch
      # oneshot) from the COMMITTED GIT BLOB — never by cp-ing the django tree
      # (§3.10 / §3.11 privileged-install model) — then runs deploy.sh as django.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json <<'EOF'
          { "commands": [
            "set -eu",
            "APP=/var/www/django_websites/Poker_server",
            "sudo -u django bash -c 'umask 027; cd '$APP' && git fetch --quiet origin main && git reset --hard --quiet origin/main'",
            "git -C $APP show origin/main:deploy/fetch-env-from-ssm.sh > /usr/local/sbin/poker-env-fetch.sh",
            "chown root:root /usr/local/sbin/poker-env-fetch.sh && chmod 0755 /usr/local/sbin/poker-env-fetch.sh",
            "for u in poker-env-fetch poker-asgi poker-celery poker-celery-beat; do git -C $APP show origin/main:deploy/systemd/$u.service > /etc/systemd/system/$u.service; done",
            "git -C $APP show origin/main:deploy/nginx/poker-api.conf > /etc/nginx/sites-available/poker-api.conf",
            "ln -sf ../sites-available/poker-api.conf /etc/nginx/sites-enabled/poker-api.conf",
            "systemctl daemon-reload",
            "systemctl enable poker-env-fetch poker-asgi poker-celery poker-celery-beat",
            "systemctl restart poker-env-fetch",
            "sudo -u django bash $APP/deploy/deploy.sh",
            "nginx -t && systemctl reload nginx"
          ], "executionTimeout": ["900"] }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy poker ${{ github.sha }}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out waiting for SSM command after 15 minutes"; exit 1
